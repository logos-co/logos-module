pector\n\nUsage: lm [command] [options] <plugin-path>\n\nCommands:\n  (default)   Show metadata, methods, and events (when no command specified)\n  metadata    Show plugin metadata (name, version, description, etc.)\n  methods     Show plugin methods and signatures\n  events      Show plugin events and signatures\n\nOptions:\n  --json      Output in JSON format\n  --debug     Show debug output from plugin loading\n  --help, -h  Show help information\n  --version, -v  Show version information\n\nExamples:\n  lm /path/to/plugin.so\n  lm /path/to/plugin.so --json\n  lm metadata /path/to/plugin.so\n  lm methods /path/to/plugin.so\n  lm metadata /path/to/plugin.so --json\n  lm methods /path/to/plugin.so --json --debug\n", "note": ""}]}, {"md": "## Step 2: Build a module to inspect\n\nWe inspect a real Logos module: `capability_module`. Building it from its flake\nyields a plugin compiled against the same nixpkgs/Qt as `lm`, so `lm` can read its\nmetadata *and* load it for live introspection. The plugin's filename isn't\nhard-coded here, so we locate it with `find` and stash the path.", "execs": []}, {"md": "### 2.1 Build capability_module and locate its plugin\n\n```bash\nnix build 'github:logos-co/logos-capability-module#default' -o capmod\n# locate the built plugin (.so on Linux, .dylib on macOS)\nfind -L capmod \\( -name '*_plugin.so' -o -name '*_plugin.dylib' \\) | head -n1\n```\n\n`capability_module` is a `logos-module-builder` C++ Qt module; its\n`packages.default` is the compiled plugin.", "execs": [{"kind": "run", "cmd": "nix build 'github:logos-co/logos-capability-module#default' -o capmod\nfind -L capmod \\( -name '*_plugin.so' -o -name '*_plugin.dylib' \\) | head -n1 > plugin_path\necho \"plugin=$(cat plugin_path)\"\n", "status": "pass", "exit_code": 0, "output": "unpacking 'github:logos-co/logos-capability-module/13441afc8e8af8cfd22d6e007c6f46874eac97d9' into the Git cache...\nunpacking 'github:logos-co/logos-module-builder/fd07679ecfa1b2d8cfdd06799f3e03ed385 cription\": \"Coordinates permissions between modules\",\n    \"name\": \"capability_module\",\n    \"type\": \"core\",\n    \"version\": \"1.0.0\"\n}\n", "note": ""}]}, {"md": "## Step 4: Error handling\n\nPointed at a path that doesn't exist, `lm` exits non-zero with a clear message. We\nadd `|| true` so the doc-test can still assert on the output of a deliberately\nfailing command.", "execs": []}, {"md": "### 4.1 Missing plugin file\n\n```bash\nlm metadata /nonexistent/path/plugin.so\n```", "execs": [{"kind": "run", "cmd": "./lm/bin/lm metadata /nonexistent/path/plugin.so 2>&1 || true", "status": "pass", "exit_code": 0, "output": "Error: Plugin file not found: /nonexistent/path/plugin.so\n", "note": ""}]}, {"md": "## Step 5: Introspect the live methods and events\n\n`lm methods` and `lm events` *load* the plugin to read its live `Q_INVOKABLE`\nsurface \u2014 which is why we built the module against the same Qt as `lm`.", "execs": []}, {"md": "### 5.1 List the live methods\n\n```bash\nlm methods capability_module_plugin.so\n```", "execs": [{"kind": "run", "cmd": "./lm/bin/lm methods \"$(cat plugin_path)\"", "status": "pass", "exit_code": 0, "output": "Plugin Methods:\n===============\n\nvoid initLogos(LogosAPI* logosAPIInstance)\n  Signature: initLogos(LogosAPI*)\n  Invokable: yes\n\nQString requestModule(QString fromModuleName, QString moduleName)\n  Signature: requestModule(QString,QString)\n  Invokable: yes\n\nbool registerRestriction(QString authToken, QString targetModule, QStringList allowedCallers)\n  Signature: registerRestriction(QString,QString,QStringList)\n  Invokable: yes\n\n", "note": ""}]}, {"md": "### 5.2 List the methods as JSON\n\n```bash\nlm methods capability_module_plugin.so --json\n```", "execs": [{"kind": "run", "cmd": "./lm/bin/lm methods \"$(cat plugin_path)\" --json", "status": "pass", "exit_code": 0, "output": "[\n    {\n        \"isInvokable\": true,\n        \"name\": \"initLogos\",\n        \"parameters\": [\n            {\n                \"name\": \"logosAPIInstance\",\n                \"type\": \"LogosAPI*\"\n            }\n        ],\n        \"returnType\": \"void\",\n        \"signature\": \"initLogos(LogosAPI*)\"\n    },\n    {\n        \"isInvokable\": true,\n        \"name\": \"requestModule\",\n        \"parameters\": [\n            {\n                \"name\": \"fromModuleName\",\n                \"type\": \"QString\"\n            },\n            {\n                \"name\": \"moduleName\",\n                \"type\": \"QString\"\n            }\n        ],\n        \"returnType\": \"QString\",\n        \"signature\": \"requestModule(QString,QString)\"\n    },\n    {\n        \"isInvokable\": true,\n        \"name\": \"registerRestriction\",\n        \"parameters\": [\n            {\n                \"name\": \"authToken\",\n                \"type\": \"QString\"\n            },\n            {\n                \"name\": \"targetModule\",\n                \"type\": \"QString\"\n            },\n            {\n                \"name\": \"allowedCallers\",\n                \"type\": \"QStringList\"\n            }\n        ],\n        \"returnType\": \"bool\",\n        \"signature\": \"registerRestriction(QString,QString,QStringList)\"\n    }\n]\n", "note": ""}]}, {"md": "### 5.3 Inspect the events\n\n```bash\nlm events capability_module_plugin.so\n```", "execs": [{"kind": "run", "cmd": "./lm/bin/lm events \"$(cat plugin_path)\"", "status": "pass", "exit_code": 0, "output": "Plugin Events:\n==============\n\n(no events found)\n", "note": ""}]}, {"md": "## Recap\n\nYou built this commit of `lm` and used it across its whole surface against a real\n`capability_module` plugin:\n\n| Command | Loads the plugin? | What it shows |\n|---|---|---|\n| `lm metadata <plugin>` | no (reads embedded section) | name, version, type, dependencies |\n| `lm metadata <plugin> --json` | no | the same, machine-readable |\n| `lm methods <plugin>` | yes | the live `Q_INVOKABLE` methods |\n| `lm events <plugin>` | yes | the events the plugin declares |\n\nBecause `lm` itself is built from the commit under test, a green run proves the\ninspector still works end-to-end \u2014 static metadata and live introspection alike.", "execs": []}]}]}</script>
<script>
  const DATA = JSON.parse(document.getElementById("report-data").textContent);
  if (window.marked) { marked.setOptions({ gfm: true, breaks: false }); }
  const mdToHtml = (s) => window.marked ? marked.parse(s || "") : ("<pre>" + (s || "") + "</pre>");

  const sum = DATA.summary;
  document.getElementById("summary").innerHTML =
    `<span class="pill pass">${sum.passed} passed</span> ` +
    (sum.failed ? `<span class="pill fail">${sum.failed} failed</span> ` : "") +
    (sum.skipped ? `<span class="pill skip">${sum.skipped} skipped</span>` : "");

  const picker = document.getElementById("picker");
  DATA.tutorials.forEach((t, i) => {
    const o = document.createElement("option");
    o.value = i; o.textContent = t.meta.name; picker.appendChild(o);
  });

  function execHtml(e) {
    const badge = `<span class="badge ${e.status}">${e.status.toUpperCase()}</span>`;
    const kind = `<span class="kind">${e.kind}${e.exit_code !== undefined ? " · exit " + e.exit_code : ""}</span>`;
    let h = `<div class="exec"><div class="exec-head">${badge}${kind}</div>`;
    if (e.note) h += `<div class="note">${escapeHtml(e.note)}</div>`;
    if (e.cmd) h += `<pre class="cmd">${escapeHtml(e.cmd)}</pre>`;
    const out = (e.output || "").trim();
    if (out) {
      const long = out.split("\n").length > 12;
      if (long) {
        h += `<details><summary>output (${out.split("\n").length} lines)</summary><pre class="output">${escapeHtml(out)}</pre></details>`;
      } else {
        h += `<pre class="output">${escapeHtml(out)}</pre>`;
      }
    }
    h += `</div>`;
    return h;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
  }

  function render(idx) {
    const t = DATA.tutorials[idx];
    const main = document.getElementById("main");
    main.innerHTML = "";
    const h = document.createElement("div");
    h.className = "tutorial-title";
    h.textContent = t.meta.name + "  —  " + t.meta.platform;
    main.appendChild(h);

    t.rows.forEach(row => {
      const isStructural = row.execs.length === 0 &&
        (/^#\s|^##\s/.test(row.md.trim()));
      const div = document.createElement("div");
      const hasExec = row.execs.length > 0;
      const hasFail = row.execs.some(e => e.status === "fail");
      div.className = "row" + (hasExec ? "" : (isStructural ? " section" : " preamble")) +
        (hasFail ? " has-fail" : "");

      const left = document.createElement("div");
      left.className = "col left";
      left.innerHTML = `<div class="md">${mdToHtml(row.md)}</div>`;
      div.appendChild(left);

      if (hasExec || !isStructural) {
        const right = document.createElement("div");
        right.className = "col right";
        if (hasExec) {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            row.execs.map(execHtml).join("");
        } else {
          right.innerHTML = `<div class="col-label">Executed</div>` +
            `<div class="empty">No commands run for this step.</div>`;
        }
        div.appendChild(right);
      }
      main.appendChild(div);
    });
  }

  function slug(s) {
    return String(s).toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
  }
  function indexFromHash() {
    const raw = decodeURIComponent(location.hash.replace(/^#/, ""));
    if (!raw) return 0;
    if (/^\d+$/.test(raw) && +raw < DATA.tutorials.length) return +raw;
    const i = DATA.tutorials.findIndex(
      t => slug(t.meta.name) === raw || t.meta.name === raw
    );
    return i >= 0 ? i : 0;
  }
  function show(idx) { picker.value = idx; render(idx); }
  picker.addEventListener("change", () => {
    location.hash = slug(DATA.tutorials[+picker.value].meta.name);
    render(+picker.value);
  });
  window.addEventListener("hashchange", () => show(indexFromHash()));
  show(indexFromHash());
</script>
</body>
